version: '3'

dotenv: ['.env']

vars:
  DBZ_CONDUCTOR_TAG: 3.6.0-SNAPSHOT
  DBZ_STAGE_TAG: 3.6.0-SNAPSHOT
  LOCAL_VALUES: "resources/charts/dmp/local.yaml"
  LOCAL_DEBUG_VALUES: "resources/charts/dmp/local-debug.yaml"
  DBZ_NS: "debezium-platform"
  NAMESPACES:
    sh: echo "{{.DBZ_NS}} databases ingress-nginx kafka"

tasks:
  create-local-cluster:
    desc: Create local Kubernetes cluster using Kind
    cmds:
      - kind create cluster --config resources/manifests/kind/kind-ingress.yaml

  delete:
    desc: Delete local Kubernetes cluster using Kind
    cmds:
      - kind delete cluster

  check-cluster:
    desc: Verify connection to Kubernetes cluster
    cmds:
      - kubectl cluster-info
      - kubectl get nodes

  create-namespaces:
    desc: Create all required namespaces
    deps: [check-cluster]
    cmds:
      - for:
          var: NAMESPACES
        cmd: kubectl create namespace {{.ITEM}} --dry-run=client -o yaml | kubectl apply -f -

  deploy-helm:
    desc: Deploy Helm charts
    deps: [create-namespaces]
    cmds:
      - helm upgrade --install ingress-nginx ingress-nginx --repo https://kubernetes.github.io/ingress-nginx --namespace ingress-nginx --set controller.hostPort.enabled=true --wait --timeout 5m --rollback-on-failure
      - helm upgrade --install strimzi-cluster-operator oci://quay.io/strimzi-helm/strimzi-kafka-operator -n kafka --wait --timeout 5m --rollback-on-failure
      - helm upgrade --install kafbat-ui kafbat-ui/kafka-ui -f resources/charts/kafbat/values.yaml -n kafka --wait --timeout 5m --rollback-on-failure
      - helm upgrade --install cnpg-operator cloudnative-pg/cloudnative-pg -n databases --wait --timeout 5m --rollback-on-failure
      - helm upgrade --install mongodb-community-operator mongodb/community-operator --namespace databases --values resources/charts/mongodb/values.yaml --wait --timeout 5m --rollback-on-failure

  build-and-deploy-dbz-platform:
    desc: Build local Debezium Platform conductor image with a unique tag and deploy it in debug mode
    cmds:
      - |
        set -euo pipefail

        DBZ_CONDUCTOR_TAG="3.6.0-SNAPSHOT-$(date +%Y%m%d-%H%M%S)"
        DESCRIPTORS_VERSION="3.6.0-SNAPSHOT"
        IMAGE_EXTRA_DIR="src/main/jib/opt/descriptors"
  
        echo "Using conductor image with tag: ${DBZ_CONDUCTOR_TAG}"

        cd $DBZ_CONDUCTOR_DIR
        
        rm -rf "src/main/jib"
        mkdir -p "${IMAGE_EXTRA_DIR}"
        
        cp -R "descriptors/${DESCRIPTORS_VERSION}" "${IMAGE_EXTRA_DIR}/"

        ./mvnw -Dquarkus.jib.platforms=linux/arm64/v8 package \
          -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.tag="${DBZ_CONDUCTOR_TAG}" \
          -DskipTests
        
        cd $DBZ_STAGE_DIR
        
        docker build \
            --platform linux/arm64/v8 \
            -t quay.io/debezium/platform-stage:"${DBZ_CONDUCTOR_TAG}" \
            .
        
        cd $ONEINT_DIR
        
        DEBUG=true task deploy-dbz-platform DBZ_CONDUCTOR_TAG="${DBZ_CONDUCTOR_TAG}"

  deploy-dbz-platform:
    desc: Deploy Debezium Platform
    cmds:
      - cmd: echo "Deploying Debezium Platform in standard mode"
        if: '{{ne .DEBUG "true"}}'
      - cmd: helm upgrade --install debezium-platform {{.DBZ_PLATFORM_REPO}} -n {{.DBZ_NS}} -f {{.LOCAL_VALUES}} --wait --timeout 5m --rollback-on-failure
        if: '{{ne .DEBUG "true"}}'
      - cmd: 'echo "Deploying Debezium Platform in debug mode: conductor tag:{{.DBZ_CONDUCTOR_TAG}}, stage tag:{{.DBZ_CONDUCTOR_TAG}}"'
        if: '{{eq .DEBUG "true"}}'
      - cmd: kind load docker-image quay.io/debezium/platform-conductor:{{.DBZ_CONDUCTOR_TAG}}
        if: '{{eq .DEBUG "true"}}'
      - cmd: kind load docker-image quay.io/debezium/platform-stage:{{.DBZ_CONDUCTOR_TAG}}
        if: '{{eq .DEBUG "true"}}'
      - cmd: helm upgrade --install debezium-platform {{.DBZ_PLATFORM_REPO}} -n {{.DBZ_NS}} -f {{.LOCAL_VALUES}} -f {{.LOCAL_DEBUG_VALUES}} --set domain.name=platform.debezium.local --set conductor.image=quay.io/debezium/platform-conductor:{{.DBZ_CONDUCTOR_TAG}} --set stage.image=quay.io/debezium/platform-stage:{{.DBZ_CONDUCTOR_TAG}} --wait --timeout 5m --rollback-on-failure
        if: '{{eq .DEBUG "true"}}'

  deploy-crs:
    desc: Deploy custom resources
    deps: [deploy-helm]
    cmds:
      - kubectl apply -f https://strimzi.io/examples/latest/kafka/kafka-single-node.yaml -n kafka
      - kubectl apply -f resources/manifests/postgresql/postgresql.yaml -n databases
      - kubectl apply -f resources/manifests/mongodb/mongodb-replica-set.yaml -n databases

  load-postgresql-data:
    desc: Load PostgreSQL schema and seed data if they do not already exist
    cmds:
      - kubectl wait --for=condition=Ready cluster/postgresql -n databases --timeout=5m
      - kubectl exec -i postgresql-1 -n databases -- env PGPASSWORD=app_owner psql -h localhost -U app_owner -d ecommerce < resources/data/postgresql/01-schemas.sql
      - kubectl exec -i postgresql-1 -n databases -- env PGPASSWORD=app_owner psql -h localhost -U app_owner -d ecommerce < resources/data/postgresql/02-data.sql
      - kubectl exec -i postgresql-1 -n databases -- env PGPASSWORD=postgres psql -h localhost -U postgres -d ecommerce < resources/data/postgresql/03-permissions.sql

  load-mongodb-data:
    desc: Load MongoDB ecommerce seed data
    cmds:
      - kubectl wait --for=condition=Ready pod/mongodb-0 -n databases --timeout=5m
      - kubectl wait --for=condition=Ready pod/mongodb-1 -n databases --timeout=5m
      - kubectl wait --for=condition=Ready pod/mongodb-2 -n databases --timeout=5m
      - kubectl run mongodb-seed-client --rm -i --restart=Never --namespace databases --image=mongo:7 --command -- mongosh "mongodb://app_owner:app_owner@mongodb-0.mongodb-svc.databases.svc.cluster.local:27017,mongodb-1.mongodb-svc.databases.svc.cluster.local:27017,mongodb-2.mongodb-svc.databases.svc.cluster.local:27017/ecommerce?authSource=admin&replicaSet=mongodb" < resources/data/mongodb/seed-ecommerce.js

  verify:
    desc: Verify all resources are running
    cmds:
      - kubectl get pods -n debezium-platform
      - kubectl get pods -n kafka
      - kubectl get pods -n databases
      - kubectl get svc -A

  deploy:
    desc: Full deployment pipeline
    cmds:
      - task: create-local-cluster
      - task: create-namespaces
      - task: deploy-helm
      - task: deploy-crs
      - task: deploy-dbz-platform
      - task: verify
