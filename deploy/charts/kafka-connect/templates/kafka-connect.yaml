apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-connect
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-connect
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: kafka-connect
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: rest-api
              containerPort: 8083
              protocol: TCP
          env:
            - name: BOOTSTRAP_SERVERS
              value: {{ .Values.bootstrapServers | quote }}
            - name: GROUP_ID
              value: {{ .Values.config.groupId | quote }}
            - name: CONFIG_STORAGE_TOPIC
              value: {{ .Values.config.configStorageTopic | quote }}
            - name: OFFSET_STORAGE_TOPIC
              value: {{ .Values.config.offsetStorageTopic | quote }}
            - name: STATUS_STORAGE_TOPIC
              value: {{ .Values.config.statusStorageTopic | quote }}
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.config.replicationFactor | quote }}
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.config.replicationFactor | quote }}
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.config.replicationFactor | quote }}
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "true"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "true"
            - name: OFFSET_FLUSH_INTERVAL_MS
              value: "10000"
            - name: REST_ADVERTISED_HOST_NAME
              value: {{ .Release.Name | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: rest-api
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: rest-api
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6