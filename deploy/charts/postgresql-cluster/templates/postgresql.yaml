apiVersion: v1
kind: Secret
metadata:
  name: postgresql-superuser
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/basic-auth
stringData:
  username: "postgres"
  password: "postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-app-owner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/basic-auth
stringData:
  username: "app_owner"
  password: "app_owner"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-debezium
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/basic-auth
stringData:
  username: "debezium"
  password: "debezium"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-apicurio
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/basic-auth
stringData:
  username: "apicurio"
  password: "apicurio"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  enableSuperuserAccess: true
  superuserSecret:
    name: postgresql-superuser

  bootstrap:
    initdb:
      database: ecommerce
      owner: app_owner
      secret:
        name: postgresql-app-owner

  postgresql:
    parameters:
      wal_level: logical
      max_replication_slots: "4"
      max_wal_senders: "4"

  managed:
    roles:
      - name: debezium
        ensure: present
        login: true
        replication: true
        passwordSecret:
          name: postgresql-debezium
        comment: "Debezium CDC user"
      - name: apicurio
        ensure: present
        login: true
        passwordSecret:
          name: postgresql-apicurio
        comment: "Apicurio Registry user"

  storage:
    size: 10Gi
    storageClass: standard

  monitoring:
    enablePodMonitor: false
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-lb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql-cluster
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    cnpg.io/cluster: postgresql
    cnpg.io/instanceRole: primary