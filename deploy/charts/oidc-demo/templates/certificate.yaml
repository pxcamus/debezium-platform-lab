# Option A (one Certificate per namespace): materialize the wildcard TLS secret in
# this namespace so the Ingress stands on its own cert. Mirrors the keycloak chart.
#
# NOTE: this is a third namespace requesting the identical *.<domain> cert (after
# identity and registry). Let's Encrypt's duplicate-certificate limit is 5/week for
# the same SAN set — fine at three, but don't loop deleting/recreating this.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-{{ .Values.domain | replace "." "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: oidc-demo
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  dnsNames:
    - '*.{{ .Values.domain }}'
  issuerRef:
    name: {{ .Values.tls.certIssuer }}
    kind: ClusterIssuer
  secretName: wildcard-{{ .Values.domain | replace "." "-" }}-tls
