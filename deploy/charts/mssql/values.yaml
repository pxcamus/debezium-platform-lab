replicaCount: 1

image:
  repository: mcr.microsoft.com/mssql/server
  tag: "2022-latest"
  pullPolicy: IfNotPresent

name: ecommerce

auth:
  saPassword: "StrongPassw0rd!"

mssql:
  acceptEula: "Y"
  agentEnabled: true

initScripts:
  enabled: true
  path: files/initdb
  hookDeletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 3
  host: mssql.databases.svc.cluster.local
  port: 1433
  database: master
  username: sa
  encrypt: false
  trustServerCertificate: true

service:
  type: LoadBalancer
  port: 1433

persistence:
  enabled: true
  storageClass: standard
  size: 10Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi
